server.port=8080
server.forward-headers-strategy=framework
server.servlet.session.timeout=15m

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/polyu_sig_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.elasticsearch.uris=${ES_URIS:http://localhost:9200}
sig.search.enabled=${SIG_SEARCH_ENABLED:false}
spring.data.elasticsearch.repositories.enabled=${ES_REPO_ENABLED:false}

management.endpoints.web.exposure.include=health,info

spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB

app.upload-dir=files
app.preview-dir=preview-cache
app.office.soffice-path=${SOFFICE_PATH:soffice}
app.office.convert-timeout-seconds=60
app.rate-limit.requests-per-minute=120
app.rate-limit.login-per-minute=20
# Bulk folder upload creates one POST /api/folders per directory; defaults must exceed deep trees.
app.rate-limit.folders-post-per-minute=8000
# Many files POST to the same session URL pattern; keep well above concurrent bulk uploads per minute.
app.rate-limit.upload-session-file-post-per-minute=15000

sig.security.allowed-file-types=*

# Bulk upload: more workers finish the server-side queue faster (tune to CPU and disk).
sig.upload.max-concurrent=8

spring.security.oauth2.client.registration.sig.client-id=${OAUTH_CLIENT_ID:sig-client}
spring.security.oauth2.client.registration.sig.client-secret=${OAUTH_CLIENT_SECRET:sig-secret}
spring.security.oauth2.client.registration.sig.scope=openid,profile,email
spring.security.oauth2.client.registration.sig.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.sig.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.sig.authorization-grant-type=authorization_code
spring.security.oauth2.client.provider.sig.authorization-uri=${OAUTH_AUTH_URI:http://localhost:9000/oauth2/authorize}
spring.security.oauth2.client.provider.sig.token-uri=${OAUTH_TOKEN_URI:http://localhost:9000/oauth2/token}
spring.security.oauth2.client.provider.sig.user-info-uri=${OAUTH_USERINFO_URI:http://localhost:9000/userinfo}
spring.security.oauth2.client.provider.sig.user-name-attribute=${OAUTH_USER_NAME_ATTRIBUTE:sub}
spring.security.oauth2.client.provider.sig.jwk-set-uri=${OAUTH_JWK_URI:http://localhost:9000/oauth2/jwks}