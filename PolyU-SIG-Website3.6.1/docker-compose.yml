services:
  postgres:
    image: postgres:16
    container_name: sig-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-polyu_sig_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-polyu_sig_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: sig-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sig-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-polyu_sig_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      ES_URIS: http://elasticsearch:9200
      SIG_SEARCH_ENABLED: "true"
      ES_REPO_ENABLED: "true"
      APP_UPLOAD_DIR: /app/files
      APP_PREVIEW_DIR: /app/preview-cache
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-sig-client}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-sig-secret}
      OAUTH_AUTH_URI: ${OAUTH_AUTH_URI:-http://localhost:9000/oauth2/authorize}
      OAUTH_TOKEN_URI: ${OAUTH_TOKEN_URI:-http://localhost:9000/oauth2/token}
      OAUTH_USERINFO_URI: ${OAUTH_USERINFO_URI:-http://localhost:9000/userinfo}
      OAUTH_JWK_URI: ${OAUTH_JWK_URI:-http://localhost:9000/oauth2/jwks}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - app_files:/app/files
      - app_preview_cache:/app/preview-cache
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sig-frontend
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "5173:5173"

  cloudflared:
    profiles:
      - tunnel
    image: cloudflare/cloudflared:latest
    container_name: sig-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  es_data:
  app_files:
  app_preview_cache:
